/* -------------------- FUNCIONES GEOMETRÍA -------------------- */
function geoToSpherical(lat, lng){
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lng + 180) * Math.PI / 180;
  return { theta, phi };
}
function sphereTo2D(theta, phi, rotation){
  const adjustedTheta = theta + rotation;
  const x = Math.sin(phi) * Math.cos(adjustedTheta);
  const y = -Math.cos(phi);
  const z = Math.sin(phi) * Math.sin(adjustedTheta);
  const screenX = planetConfig.centerX + x * planetConfig.radius;
  const screenY = planetConfig.centerY + y * planetConfig.radius;
  return { x: screenX, y: screenY, z: z, visible: z > -0.2 };
}
function sphereTo2D_custom(theta, phi, rotation, centerX, centerY, radius){
  const adjustedTheta = theta + rotation;
  const x = Math.sin(phi) * Math.cos(adjustedTheta);
  const y = -Math.cos(phi);
  const z = Math.sin(phi) * Math.sin(adjustedTheta);
  const screenX = centerX + x * radius;
  const screenY = centerY + y * radius;
  return { x: screenX, y: screenY, z: z, visible: z > -0.2 };
}

/* -------------------- DIBUJADO -------------------- */
function generateGridLines(){
  const lines=[];
  for(let lat=-80; lat<=80; lat+=20){
    const phi=(90-lat)*Math.PI/180; const line=[];
    for(let lon=-180; lon<=180; lon+=8){ const theta=(lon+180)*Math.PI/180; line.push({theta,phi}); }
    lines.push(line);
  }
  for(let lon=-180; lon<180; lon+=30){
    const theta=(lon+180)*Math.PI/180; const line=[];
    for(let lat=-90; lat<=90; lat+=3){ const phi=(90-lat)*Math.PI/180; line.push({theta,phi}); }
    lines.push(line);
  }
  return lines;
}

function drawCountryBorders_custom(rotation, centerX, centerY, radius){
  planetCtx.strokeStyle = planetConfig.color;
  planetCtx.globalAlpha = 0.4;
  planetCtx.lineWidth = 0.8;
  Object.entries(countryBorders).forEach(([countryName, coordinates])=>{
    planetCtx.beginPath();
    let firstPoint=true; const projectedPoints=[];
    coordinates.forEach(([lat,lng])=>{
      const spherical = geoToSpherical(lat,lng);
      const projected = sphereTo2D_custom(spherical.theta,spherical.phi,rotation,centerX,centerY,radius);
      projectedPoints.push(projected);
    });
    const visibleCount = projectedPoints.filter(p=>p.visible).length;
    if(visibleCount > coordinates.length * 0.3){
      projectedPoints.forEach(projected=>{
        if(projected.visible){
          if(firstPoint){ planetCtx.moveTo(projected.x,projected.y); firstPoint=false; }
          else planetCtx.lineTo(projected.x,projected.y);
        } else { firstPoint=true; }
      });
      planetCtx.stroke();
    }
  });
  planetCtx.globalAlpha = 1.0;
}

/* -------------------- PREPARAR PAISES / ANIMACIÓN -------------------- */
const gridLines = generateGridLines();
const countryPoints = worldCountries.map(country=>{
  const spherical = geoToSpherical(country.lat, country.lng);
  return { name: country.name, theta: spherical.theta, phi: spherical.phi, lat: country.lat, lng: country.lng };
});

let rotation = 0;
let zooming = false;
let zoomProgress = 0;
let zoomTarget = null;
let zoomStartRadius = planetConfig.radius;
let zoomEndRadius = Math.max(planetConfig.centerX, planetConfig.centerY) * 2.2;
let zoomStartCenter = { x: planetConfig.centerX, y: planetConfig.centerY };
let zoomEndCenter = { x: planetConfig.centerX, y: planetConfig.centerY };
let zoomStartRotation = 0;
let zoomEndRotation = 0;
let hoveredCountry = null;
let zoomedOut = false;
let redirectUrl = null;
let pointColor = '#C5C5C5';

const hoverRadiusMap = new Map();
const BASE_RADIUS = 4;
const HOVER_RADIUS = 14;
const HOVER_SPEED = 0.25;

planetCanvas.addEventListener('mousemove', function(e){
  if(zooming || zoomedOut) return;
  const rect = planetCanvas.getBoundingClientRect();
  const mouseX = e.clientX - rect.left;
  const mouseY = e.clientY - rect.top;
  let found = null;
  for(const country of countryPoints){
    const projected = sphereTo2D(country.theta, country.phi, rotation);
    if(projected.visible){
      const dx = mouseX - projected.x, dy = mouseY - projected.y;
      if(dx*dx + dy*dy < HOVER_RADIUS*HOVER_RADIUS){ found = country; break; }
    }
  }
  hoveredCountry = found;
});
planetCanvas.addEventListener('mouseleave', ()=>{ if(!zooming && !zoomedOut) hoveredCountry=null; });

planetCanvas.addEventListener('click', function(e){
  if(zooming || zoomedOut) return;
  const rect = planetCanvas.getBoundingClientRect();
  const mouseX = e.clientX - rect.left;
  const mouseY = e.clientY - rect.top;
  for(const country of countryPoints){
    const projected = sphereTo2D(country.theta, country.phi, rotation);
    if(projected.visible){
      const pointRadius = hoverRadiusMap.get(country.name) || BASE_RADIUS;
      const dx = mouseX - projected.x, dy = mouseY - projected.y;
      if(dx*dx + dy*dy < pointRadius*pointRadius){
        zooming = true; zoomProgress = 0; zoomTarget = country;
        redirectUrl = country.name.toLowerCase() === 'colombia' ? 'yau.html' : null;
        zoomStartRadius = planetConfig.radius;
        zoomEndRadius = Math.max(planetConfig.centerX, planetConfig.centerY) * 2.2;
        zoomStartCenter = { x: planetConfig.centerX, y: planetConfig.centerY };
        zoomEndCenter = { x: projected.x, y: projected.y };
        zoomStartRotation = rotation;
        zoomEndRotation = country.theta - Math.PI/2;
        pointColor = planetConfig.color;
        break;
      }
    }
  }
});

function lerp(a,b,t){ return a + (b-a) * t; }

let fadeStarted=false;
function startFadeAndRedirect(){
  if(fadeStarted) return;
  fadeStarted=true;
  const fadeDiv = document.createElement('div');
  fadeDiv.style.position='fixed'; fadeDiv.style.left='0'; fadeDiv.style.top='0';
  fadeDiv.style.width='100vw'; fadeDiv.style.height='100vh'; fadeDiv.style.background='#181818';
  fadeDiv.style.opacity='0'; fadeDiv.style.transition='opacity 1s'; fadeDiv.style.zIndex='9999';
  document.body.appendChild(fadeDiv);
  setTimeout(()=>{ fadeDiv.style.opacity='1'; }, 10);
  setTimeout(()=>{ 
    if (redirectUrl) {
      window.location.href = redirectUrl;
    }
  }, 1100);
}

function fillScreenWithPointColor(){
  planetCtx.save();
  planetCtx.globalAlpha=1;
  planetCtx.fillStyle='#181818';
  planetCtx.fillRect(0,0,planetCanvas.width,planetCanvas.height);
  planetCtx.restore();
}

function drawPlanet(){
  if(zoomedOut){ fillScreenWithPointColor(); startFadeAndRedirect(); return; }

  // Animar radios
  for(const country of countryPoints){
    let targetRadius = BASE_RADIUS;
    if(hoveredCountry && hoveredCountry.name === country.name && !zooming && !zoomedOut) targetRadius = HOVER_RADIUS;
    let currentRadius = hoverRadiusMap.get(country.name) || BASE_RADIUS;
    currentRadius += (targetRadius - currentRadius) * HOVER_SPEED;
    hoverRadiusMap.set(country.name, currentRadius);
  }

  let currentRadius = planetConfig.radius;
  let currentCenterX = planetConfig.centerX;
  let currentCenterY = planetConfig.centerY;
  let currentRotation = rotation;

  if(zooming && zoomTarget){
    zoomProgress = Math.min(zoomProgress + 0.012, 1);
    currentRadius = lerp(zoomStartRadius, zoomEndRadius, zoomProgress);
    currentRotation = lerp(zoomStartRotation, zoomEndRotation, zoomProgress);
    currentCenterX = lerp(zoomStartCenter.x, zoomEndCenter.x, zoomProgress);
    currentCenterY = lerp(zoomStartCenter.y, zoomEndCenter.y, zoomProgress);
    if(zoomProgress >= 1){ zooming=false; zoomedOut=true; }
  } else if(!zoomedOut){
    rotation += planetConfig.rotationSpeed;
    currentRotation = rotation;
  }

  planetCtx.clearRect(0,0,planetCanvas.width,planetCanvas.height);

  // Dibujar grid
  planetCtx.strokeStyle = planetConfig.color;
  planetCtx.globalAlpha = 0.7;
  planetCtx.lineWidth = 1;
  gridLines.forEach(line=>{
    planetCtx.beginPath(); let firstPoint=true;
    line.forEach(point=>{
      const projected = sphereTo2D_custom(point.theta, point.phi, currentRotation, currentCenterX, currentCenterY, currentRadius);
      if(projected.visible){
        if(firstPoint){ planetCtx.moveTo(projected.x, projected.y); firstPoint=false; }
        else planetCtx.lineTo(projected.x, projected.y);
      } else { firstPoint=true; }
    });
    planetCtx.stroke();
  });
  planetCtx.globalAlpha = 1.0;

  // Dibujar borders y conexiones
  drawCountryBorders_custom(currentRotation, currentCenterX, currentCenterY, currentRadius);

  const visibleCountries = [];
  const countryPositions = new Map();
  countryPoints.forEach(country=>{
    const projected = sphereTo2D_custom(country.theta, country.phi, currentRotation, currentCenterX, currentCenterY, currentRadius);
    countryPositions.set(country.name, projected);
    if(projected.visible) visibleCountries.push({...country, ...projected});
  });

  planetCtx.strokeStyle = planetConfig.color; planetCtx.lineWidth = 1.5;
  countryConnections.forEach(([c1,c2])=>{
    const pos1 = countryPositions.get(c1), pos2 = countryPositions.get(c2);
    if(pos1 && pos2 && pos1.visible && pos2.visible){
      planetCtx.beginPath(); planetCtx.moveTo(pos1.x,pos1.y); planetCtx.lineTo(pos2.x,pos2.y); planetCtx.stroke();
    }
  });

  visibleCountries.forEach(country=>{
    planetCtx.beginPath();
    let pointRadius = hoverRadiusMap.get(country.name) || BASE_RADIUS;
    planetCtx.arc(country.x, country.y, pointRadius, 0, Math.PI*2);
    planetCtx.fillStyle = planetConfig.color; planetCtx.fill();
    planetCtx.fillStyle = planetConfig.color; planetCtx.font = '18px Arial';
    planetCtx.fillText(country.name, country.x + 8, country.y - 8);
  });
}

function animatePlanet(){ drawPlanet(); requestAnimationFrame(animatePlanet); }
animatePlanet();

/* -------------------- BÚSQUEDA LOCAL (zoom por nombre) -------------------- */
function zoomToCountryByName(name){
  const country = countryPoints.find(c => c.name.toLowerCase() === name.trim().toLowerCase());
  if(!country) return false;
  const projected = sphereTo2D(country.theta, country.phi, rotation);
  zooming = true; zoomProgress = 0; zoomTarget = country;
  redirectUrl = country.name.toLowerCase() === 'colombia' ? 'yau.html' : null;
  zoomStartRadius = planetConfig.radius;
  zoomEndRadius = Math.max(planetConfig.centerX, planetConfig.centerY) * 2.2;
  zoomStartCenter = { x: planetConfig.centerX, y: planetConfig.centerY };
  zoomEndCenter = { x: projected.x, y: projected.y };
  zoomStartRotation = rotation;
  zoomEndRotation = country.theta - Math.PI/2;
  pointColor = planetConfig.color;
  return true;
}

/* -------------------- FUNCIÓN DE BÚSQUEDA DE LUGARES TURÍSTICOS -------------------- */
/**
 * @function getCoordinatesFromNominatim
 * @description Usa Nominatim (OpenStreetMap) para obtener coordenadas GRATIS
 *              Sin necesidad de API key de Google
 * @param {string} locationName - Nombre del lugar turístico a buscar
 * @returns {Promise<Object|null>} Objeto con {lat, lng} o null si no encuentra
 */
async function getCoordinatesFromNominatim(locationName) {
  try {
    const encodedLocation = encodeURIComponent(locationName.trim());
    const response = await fetch(
      `https://nominatim.openstreetmap.org/search?format=json&q=${encodedLocation}&limit=1`,
      { headers: { 'User-Agent': 'TourismPlatform/1.0' } }
    );
    const data = await response.json();
    
    if (data.length > 0) {
      return {
        lat: parseFloat(data[0].lat),
        lng: parseFloat(data[0].lon),
        displayName: data[0].display_name
      };
    }
  } catch (error) {
    console.error('Error obteniendo coordenadas:', error);
  }
  return null;
}

/**
 * @function generateGoogleMapsStreetViewUrl
 * @description Genera la URL correcta de Google Maps Street View con coordenadas
 * @param {number} lat - Latitud
 * @param {number} lng - Longitud
 * @returns {string} URL de Google Maps Street View
 */
function generateGoogleMapsStreetViewUrl(lat, lng) {
  // Formato: @lat,lng,75m fuerza Street View a nivel del terreno
  // /data=!3m4!1e1!3m2!1e0!2e0 activa Street View completamente
  return `https://www.google.com/maps/@${lat},${lng},75m/data=!3m4!1e1!3m2!1e0!2e0`;
}

/**
 * @function searchPlace
 * @description Busca un lugar: primero intenta encontrarlo en el planeta (países),
 *              si no lo encuentra, geocodifica con Nominatim y abre Google Maps Street View
 */
async function searchPlace() {
  const searchInput = document.getElementById('user-question');
  const answerElement = document.getElementById('assistant-answer');
  const query = searchInput.value.trim();

  // Validar que escribió algo
  if (!query || query.length === 0) {
    answerElement.innerHTML = "⚠️ Escribe un país o lugar turístico para buscar.";
    return;
  }

  // Intentar buscar en el planeta (países)
  if (zoomToCountryByName(query)) {
    answerElement.innerHTML = "🌍 Mostrando en el planeta...";
    return;
  }

  // Si no encontró en el planeta, buscar en Google Maps Street View (360°)
  answerElement.innerHTML = "🔍 Buscando ubicación...";
  
  // Obtener coordenadas usando Nominatim (OpenStreetMap - GRATIS)
  const coords = await getCoordinatesFromNominatim(query);
  
  if (coords) {
    answerElement.innerHTML = `📍 Abriendo Street View de: ${coords.displayName}...`;
    const mapsUrl = generateGoogleMapsStreetViewUrl(coords.lat, coords.lng);
    
    setTimeout(() => {
      window.location.href = mapsUrl;
    }, 800);
  } else {
    answerElement.innerHTML = "❌ No encontramos ese lugar. Intenta con otro nombre.";
  }
}

document.getElementById('user-question').addEventListener('keydown', function(e){
  if(e.key === 'Enter') searchPlace();
});
  </script>
</body>
